[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "maiat-evaluator"
version = "0.1.0"
description = "Drop-in trust evaluator for Virtuals ACP / GAME SDK. One line to protect your agent transactions."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "Maiat Protocol", email = "dev@maiat.io" },
]
keywords = ["acp", "virtuals", "evaluator", "trust", "agent", "erc-8183", "game-sdk"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
]
dependencies = [
    "httpx>=0.24.0",
]

[project.urls]
Homepage = "https://maiat.io"
Repository = "https://github.com/JhiNResH/maiat-protocol"
Documentation = "https://docs.maiat.io"

[tool.hatch.build.targets.wheel]
packages = ["src/maiat_evaluator"]

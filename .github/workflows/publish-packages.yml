name: Publish npm Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (all | elizaos-plugin | agentkit-plugin | mcp-server | virtuals-plugin | guard | sdk | game-plugin)'
        required: true
        default: 'all'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ─── Publish to npmjs.org ─────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - elizaos-plugin
          - agentkit-plugin
          - mcp-server
          - virtuals-plugin
          - guard
          - sdk
          - game-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Skip if manual and not selected
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.package != 'all' && github.event.inputs.package != matrix.package
        run: exit 0

      - name: Install & Build
        working-directory: packages/${{ matrix.package }}
        run: |
          npm install --ignore-scripts
          npm run build 2>/dev/null || true

      - name: Check if version already published
        id: check_npm
        working-directory: packages/${{ matrix.package }}
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${VER}" version 2>/dev/null | grep -q "${VER}"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ ${PKG}@${VER} already published — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🚀 Publishing ${PKG}@${VER}..."
          fi

      - name: Publish to npm
        if: steps.check_npm.outputs.skip != 'true'
        working-directory: packages/${{ matrix.package }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Publish to GitHub Packages ───────────────────────────────────────────
  publish-gpr:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - elizaos-plugin
          - agentkit-plugin
          - mcp-server
          - virtuals-plugin
          - guard
          - sdk
          - game-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@jhinresh'

      - name: Skip if manual and not selected
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.package != 'all' && github.event.inputs.package != matrix.package
        run: exit 0

      - name: Install & Build
        working-directory: packages/${{ matrix.package }}
        run: |
          npm install --ignore-scripts
          npm run build 2>/dev/null || true

      - name: Check scope and version for GPR
        id: check_gpr
        working-directory: packages/${{ matrix.package }}
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          # GPR requires scope to match GitHub owner — skip @maiat/* packages
          if [[ "$PKG" != @jhinresh/* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ ${PKG} — not @jhinresh scope, skipping GPR"
          elif npm view "${PKG}@${VER}" version --registry https://npm.pkg.github.com 2>/dev/null | grep -q "${VER}"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ ${PKG}@${VER} already published on GPR — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.check_gpr.outputs.skip != 'true'
        working-directory: packages/${{ matrix.package }}
        run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

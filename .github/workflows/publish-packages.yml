name: Publish npm Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (all | elizaos-plugin | agentkit-plugin | mcp-server | virtuals-plugin)'
        required: true
        default: 'all'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - elizaos-plugin
          - agentkit-plugin
          - mcp-server
          - virtuals-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Skip if manual and not selected
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.package != 'all' && github.event.inputs.package != matrix.package
        run: exit 0

      - name: Install & Build
        working-directory: packages/${{ matrix.package }}
        run: |
          npm install
          npm run build

      - name: Publish to npm
        working-directory: packages/${{ matrix.package }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gpr:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - elizaos-plugin
          - agentkit-plugin
          - mcp-server
          - virtuals-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@maiat'

      - name: Install & Build
        working-directory: packages/${{ matrix.package }}
        run: |
          npm install
          npm run build

      - name: Publish to GitHub Packages
        working-directory: packages/${{ matrix.package }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

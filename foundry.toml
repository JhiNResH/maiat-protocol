[profile.default]
src = "contracts/src"
test = "contracts/test"
out = "out"
libs = ["contracts/lib"]
solc = "0.8.26"
via_ir = true
remappings = [
  "forge-std/=contracts/lib/forge-std/src/",
  "v4-core/=contracts/lib/v4-core/src/",
  "openzeppelin-contracts/=contracts/lib/openzeppelin-contracts/",
  "@openzeppelin/contracts/=contracts/lib/openzeppelin-contracts/contracts/",
  "solmate/=contracts/lib/v4-periphery/lib/v4-core/lib/solmate/",
  "ds-test/=contracts/lib/forge-std/lib/ds-test/src/"
]
